name: Auto Email Test

on:
  schedule:
  - cron: "30 12 13 4 *"   # 13 April 2026 6:00 PM IST
  workflow_dispatch:

jobs:
  send-email:
    runs-on: ubuntu-latest

    steps:
      - name: Send Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: "GitHub Auto Test"
          body: "hi"
          to: ${{ secrets.TO_EMAIL }}
          from: ${{ secrets.EMAIL_USER }}
          secure: false
